<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #EDEDF0; }
        .blockio-card {
            background: #FFFFFF;
            border: 1px solid #E5E5E9;
            border-radius: 28px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.015);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="blockio-card p-6 sm:p-8 max-w-sm w-full text-center space-y-4">
        <!-- ৪0৪ নিয়ন আইকন -->
        <div class="w-14 h-14 bg-red-500/10 border border-red-500/20 text-red-500 rounded-2xl flex items-center justify-center mx-auto text-xl shadow-[0_0_15px_rgba(239,68,68,0.05)] animate-pulse">
            <i class="fa-solid fa-triangle-exclamation"></i>
        </div>

        <div class="space-y-1.5 leading-normal">
            <h1 class="text-base font-black text-slate-900 leading-none">404 - Page Not Found</h1>
            <p class="text-xs font-bold text-slate-800 leading-normal">পেজটি খুঁজে পাওয়া যায়নি</p>
            <p class="text-[10px] text-slate-400 font-medium leading-relaxed">দুঃখিত, আপনি যে লিংকটি খুঁজছেন তা হয়তো ভুল অথবা ডিলিট করে দেওয়া হয়েছে। দয়া করে সঠিক লিংক ভেরিফাই করুন।</p>
        </div>

        <!-- হোমে ফিরে যাওয়ার বাটন -->
        <div class="pt-2">
            <a href="/dashboard" class="block w-full bg-black hover:opacity-90 text-white font-extrabold text-xs py-2.5 rounded-xl transition text-center shadow">
                হোম ড্যাশবোর্ডে ফিরে যান
            </a>
        </div>
    </div>

</body>
</html>
