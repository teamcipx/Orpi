<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opti Work - Admin Control</title>
    
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #EDEDF0; 
        }
        .blockio-card {
            background: #FFFFFF;
            border: 1px solid #E5E5E9;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.015);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .blockio-card:hover {
            border-color: #fba82f;
            transform: translateY(-1.5px);
            box-shadow: 0 10px 25px rgba(251, 168, 47, 0.03);
        }
    </style>
</head>
<body class="text-[#000000] min-h-screen flex flex-col md:flex-row pb-10 md:pb-0">

    <!-- ================= ১. ডেস্কটপ এডমিন সাইডবার (Midnight Black Theme) ================= -->
    <aside class="hidden md:flex flex-col justify-between w-64 bg-[#070A13] border-r border-[#111726] h-screen fixed left-0 top-0 p-5 z-40">
        <div class="space-y-6">
            <!-- এডমিন লোগো এবং লাইভ নিয়েন ডট -->
            <a href="/admin" class="flex items-center space-x-2.5 px-2">
                <div class="w-2.5 h-2.5 bg-[#fba82f] rounded-full shadow-[0_0_8px_#fba82f] animate-pulse"></div>
                <span class="text-xs font-extrabold tracking-widest text-white uppercase">
                    OPTIWORK <span class="text-[#fba82f]">ADMIN</span>
                </span>
            </a>

            <!-- ৮টি অপশন সম্পন্ন সম্পূর্ণ নেভিগেশন লিংকসমূহ -->
            <div class="space-y-2 text-xs font-bold uppercase tracking-wider text-gray-400">
                <a href="/admin" class="admin-nav-link flex items-center gap-3 px-3.5 py-3 rounded-xl hover:bg-[#111726] hover:text-white transition-all duration-200">
                    <i class="fa-solid fa-chart-line text-sm"></i> Dashboard
                </a>
                <a href="/admin/user-search" class="admin-nav-link flex items-center gap-3 px-3.5 py-3 rounded-xl hover:bg-[#111726] hover:text-white transition-all duration-200">
                    <i class="fa-solid fa-magnifying-glass-chart text-sm"></i> User Audit
                </a>
                <a href="/admin/deposits" class="admin-nav-link flex items-center gap-3 px-3.5 py-3 rounded-xl hover:bg-[#111726] hover:text-white transition-all duration-200">
                    <i class="fa-solid fa-plus-circle text-sm"></i> Deposits
                </a>
                <a href="/admin/withdrawals" class="admin-nav-link flex items-center gap-3 px-3.5 py-3 rounded-xl hover:bg-[#111726] hover:text-white transition-all duration-200">
                    <i class="fa-solid fa-money-bill-transfer text-sm"></i> Withdraws
                </a>
                <a href="/admin/gmails" class="admin-nav-link flex items-center gap-3 px-3.5 py-3 rounded-xl hover:bg-[#111726] hover:text-white transition-all duration-200">
                    <i class="fa-solid fa-envelope text-sm"></i> Gmail Sales
                </a>
                <a href="/admin/add" class="admin-nav-link flex items-center gap-3 px-3.5 py-3 rounded-xl hover:bg-[#111726] hover:text-white transition-all duration-200">
                    <i class="fa-solid fa-list-check text-sm"></i> Task Pool
                </a>
                <a href="/admin/payout" class="admin-nav-link flex items-center gap-3 px-3.5 py-3 rounded-xl hover:bg-[#111726] hover:text-white transition-all duration-200">
                    <i class="fa-solid fa-image text-sm"></i> Reports
                </a>
                <a href="/admin/keys" class="admin-nav-link flex items-center gap-3 px-3.5 py-3 rounded-xl hover:bg-[#111726] hover:text-white transition-all duration-200">
                    <i class="fa-solid fa-key text-sm"></i> ImgBB Keys
                </a>
            </div>
        </div>

        <div class="border-t border-[#111726] pt-4 flex items-center justify-between">
            <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Admin Control</span>
            <a href="/dashboard" class="text-slate-500 hover:text-white transition text-xs font-bold uppercase tracking-wider flex items-center gap-1">App <i class="fa-solid fa-arrow-right-to-bracket text-[10px]"></i></a>
        </div>
    </aside>

    <!-- ================= ২. মোবাইল ফ্লোটিং ক্যাপসুল হেডার ================= -->
    <div class="md:hidden sticky top-0 z-50 w-full px-4 pt-3.5 pb-1 bg-gradient-to-b from-[#EDEDF0] via-[#EDEDF0]/90 to-transparent">
        <div class="bg-white border border-[#E5E5E9] rounded-2xl px-4 py-3 flex justify-between items-center shadow-sm relative">
            <a href="/admin" class="flex items-center space-x-2">
                <div class="w-2 h-2 bg-[#fba82f] rounded-full shadow-[0_0_8px_#fba82f] animate-pulse"></div>
                <span class="text-xs font-black tracking-widest uppercase">
                    OPTIWORK <span class="text-[#fba82f]">ADMIN</span>
                </span>
            </a>
            
            <button onclick="toggleAdminMenu()" class="text-slate-800 bg-slate-50 hover:bg-slate-100 border border-slate-200 p-2 rounded-xl focus:outline-none transition-all duration-300">
                <i id="menu-icon" class="fa-solid fa-bars text-sm"></i>
            </button>
        </div>

        <!-- মোবাইল মেনু ডাইনামিক টগল ড্রপডাউন (৮টি অপশনসহ) -->
        <div id="top-dropdown-menu" class="hidden mt-2 border border-slate-250 bg-[#070A13] text-gray-300 px-5 py-4 space-y-2 text-[10px] font-bold uppercase tracking-wider w-full rounded-2xl shadow-xl">
            <a href="/admin" class="block py-2.5 hover:text-white border-b border-white/5"><i class="fa-solid fa-chart-line mr-2"></i> Dashboard</a>
            <a href="/admin/user-search" class="block py-2.5 hover:text-white border-b border-white/5"><i class="fa-solid fa-magnifying-glass-chart mr-2"></i> User Audit</a>
            <a href="/admin/deposits" class="block py-2.5 hover:text-white border-b border-white/5"><i class="fa-solid fa-plus-circle mr-2"></i> Deposits</a>
            <a href="/admin/withdrawals" class="block py-2.5 hover:text-white border-b border-white/5"><i class="fa-solid fa-money-bill-transfer mr-2"></i> Withdraws</a>
            <a href="/admin/gmails" class="block py-2.5 hover:text-white border-b border-white/5"><i class="fa-solid fa-envelope mr-2"></i> Gmail Sales</a>
            <a href="/admin/add" class="block py-2.5 hover:text-white border-b border-white/5"><i class="fa-solid fa-list-check mr-2"></i> Tasks Manage</a>
            <a href="/admin/payout" class="block py-2.5 hover:text-white border-b border-white/5"><i class="fa-solid fa-image mr-2"></i> Reports</a>
            <a href="/admin/keys" class="block py-2.5 hover:text-white border-b border-white/5"><i class="fa-solid fa-key mr-2"></i> ImgBB Keys</a>
            <a href="/dashboard" class="block py-2.5 text-[#fba82f]"><i class="fa-solid fa-arrow-right-to-bracket mr-2"></i> Exit to App</a>
        </div>
    </div>

    <!-- মেইন কন্টেন্ট উইন্ডো -->
    <main class="max-w-5xl mx-auto p-4 mt-2 w-full flex-grow md:pl-64 shadow-none">
        {% block admin_content %}{% endblock %}
    </main>

    <script>
        function toggleAdminMenu() {
            const menu = document.getElementById('top-dropdown-menu');
            const icon = document.getElementById('menu-icon');
            if (menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-xmark');
            } else {
                menu.classList.add('hidden');
                icon.classList.remove('fa-xmark');
                icon.classList.add('fa-bars');
            }
        }

        // সাইডবারের একটিভ স্টেট ট্র্যাকার স্ক্রিপ্ট
        document.addEventListener("DOMContentLoaded", function() {
            const path = window.location.pathname;
            const navLinks = document.querySelectorAll('.admin-nav-link');
            
            navLinks.forEach(link => {
                const href = link.getAttribute('href');
                if (path === href) {
                    link.classList.remove('text-gray-400');
                    link.classList.add('bg-[#111726]', 'text-white');
                    // আইকনের কালার অ্যাম্বার-গোল্ড করা
                    const icon = link.querySelector('i');
                    if (icon) {
                        icon.classList.remove('text-slate-500');
                        icon.classList.add('text-[#fba82f]');
                    }
                }
            });
        });
    </script>
</body>
</html>
