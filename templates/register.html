<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opti Work - Create Account</title>
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ৩ডি লাইভ থাম্বমার্ক জেএস অফিশিয়াল সিডিএন লাইব্রেরি (অক্ষুণ্ণ) -->
    <script src="https://cdn.jsdelivr.net/npm/@thumbmarkjs/thumbmarkjs/dist/thumbmark.umd.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* প্রিমিয়াম লাইট ডট গ্রিড ব্যাকগ্রাউন্ড */
        body {
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1.2px, transparent 1.2px), radial-gradient(#cbd5e1 1.2px, #f8fafc 1.2px);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            background-attachment: fixed;
        }
        .premium-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(226, 232, 240, 0.9);
            box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.05), 0 8px 16px -6px rgba(15, 23, 42, 0.03);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>
<body class="text-[#0F172A] min-h-screen flex items-center justify-center px-4 py-8 antialiased">

    <!-- প্রিমিয়াম ৩ডি গ্লাস কার্ড প্যানেল -->
    <div class="premium-card p-6 sm:p-8 max-w-sm w-full relative overflow-hidden">
        <!-- ব্যাকগ্রাউন্ড গ্লো ডিজাইন -->
        <div class="absolute -right-10 -top-10 w-28 h-28 bg-blue-500/5 rounded-full blur-3xl"></div>
        
        <!-- লোগো এবং বোনাস নোটিশ -->
        <div class="text-center mb-6 border-b border-slate-100 pb-5">
            <div class="flex items-center justify-center space-x-2.5">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="2" width="8" height="8" rx="2.5" fill="#2563eb"/>
                    <rect x="2" y="14" width="8" height="8" rx="2.5" fill="#2563eb"/>
                    <rect x="14" y="14" width="8" height="8" rx="2.5" fill="#2563eb"/>
                    <path d="M14 2H18C20.2091 2 22 3.79086 22 6V10C22 12.2091 20.2091 14 18 14H14V2Z" fill="#2563eb"/>
                </svg>
                <span class="text-lg font-black tracking-wider text-[#0F172A]">
                    OPTI<span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">WORK</span>
                </span>
            </div>
            
            <!-- সংশোধিত ৫০ টাকা জয়েনিং বোনাস গ্লো ব্যাজ -->
            <div class="mt-4 bg-gradient-to-r from-blue-50 to-indigo-50 border border-blue-100 text-blue-700 text-[10px] font-black px-4 py-2 rounded-full inline-flex items-center gap-1.5 shadow-sm uppercase tracking-wide">
                <span class="w-1.5 h-1.5 bg-blue-600 rounded-full animate-ping"></span>
                <span>৳৫০ জয়েনিং বোনাস ভেরিফাইড</span>
            </div>
        </div>
        
        <!-- ফ্ল্যাশ এরর মেসেজ নোটিশ -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="p-3 mb-4 text-[10px] text-center text-red-600 bg-red-50 border border-red-100 rounded-2xl font-black leading-normal">
                        <i class="fa-solid fa-triangle-exclamation mr-1"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- রেজিষ্ট্রেশন ফর্ম -->
        <form action="/register" method="POST" class="space-y-4">
            <!-- হিডেন ডিভাইস ফিঙ্গারপ্রিন্ট এবং ডিভাইস নেম ইনপুট -->
            <input type="hidden" name="device_fingerprint" id="device-fingerprint-input">
            <input type="hidden" name="device_name" id="device-name-input">

            <!-- ব্যবহারকারীর নাম -->
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase mb-1.5 tracking-wider">ব্যবহারকারীর নাম</label>
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400 group-focus-within:text-blue-600 transition-colors duration-200">
                        <i class="fa-regular fa-user text-xs"></i>
                    </span>
                    <input type="text" name="username" required placeholder="নাম টাইপ করুন..." 
                           class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-xs text-slate-800 placeholder-slate-400 font-extrabold focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-50/50 focus:bg-white transition-all duration-300 shadow-sm">
                </div>
            </div>

            <!-- ইমেইল এড্রেস -->
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase mb-1.5 tracking-wider">ইমেইল এড্রেস</label>
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400 group-focus-within:text-blue-600 transition-colors duration-200">
                        <i class="fa-regular fa-envelope text-xs"></i>
                    </span>
                    <input type="email" name="email" required placeholder="name@domain.com" 
                           class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-xs text-slate-800 placeholder-slate-400 font-extrabold focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-50/50 focus:bg-white transition-all duration-300 shadow-sm">
                </div>
            </div>
            
            <!-- পাসওয়ার্ড -->
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase mb-1.5 tracking-wider">পাসওয়ার্ড</label>
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400 group-focus-within:text-blue-600 transition-colors duration-200">
                        <i class="fa-solid fa-lock text-xs"></i>
                    </span>
                    <input type="password" name="password" required placeholder="••••••••" 
                           class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-xs text-slate-800 placeholder-slate-400 font-extrabold focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-50/50 focus:bg-white transition-all duration-300 shadow-sm">
                </div>
            </div>

            <!-- আমন্ত্রণ কোড -->
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase mb-1.5 tracking-wider">আমন্ত্রণ কোড (Referral Code / UID)</label>
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400 group-focus-within:text-blue-600 transition-colors duration-200">
                        <i class="fa-solid fa-ticket text-xs"></i>
                    </span>
                    <input type="text" name="referrer" value="{{ ref_by }}" placeholder="6892 (ঐচ্ছিক)" 
                           class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-xs text-slate-800 placeholder-slate-400 font-mono font-extrabold focus:outline-none focus:border-blue-500 focus:bg-white transition-all duration-300 shadow-sm">
                </div>
            </div>

            <!-- সাবমিট বাটন (রাউন্ডেড গ্রেডিয়েন্ট গ্লো) -->
            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-black text-xs py-3.5 rounded-2xl transition tracking-wider uppercase shadow-[0_4px_12px_rgba(37,99,235,0.2)] hover:shadow-[0_6px_20px_rgba(37,99,235,0.35)]">
                অ্যাকাউন্ট তৈরি করুন
            </button>
        </form>

        <p class="text-center text-[11px] text-slate-500 font-bold mt-5">
            ইতিমধ্যে একটি অ্যাকাউন্ট আছে? <a href="/login" class="text-blue-600 font-black hover:underline">লগইন করুন</a>
        </p>
    </div>

    <!-- ThumbmarkJS এবং গুগল ক্রোম ক্লায়েন্ট এপিআই স্ক্রিপ্ট (হুবহু অক্ষুণ্ণ রাখা হয়েছে) -->
    <script>
        async function getPhysicalDeviceName() {
            let device = "Unknown Device";
            const ua = navigator.userAgent;

            try {
                if (navigator.userAgentData && typeof navigator.userAgentData.getHighEntropyValues === 'function') {
                    const hint = await navigator.userAgentData.getHighEntropyValues(['model', 'platform']);
                    if (hint.model) {
                        return hint.model + " (" + hint.platform + ")";
                    }
                }

                if (/android/i.test(ua)) {
                    const matches = ua.match(/Android\s+[^;]+;\s+([^;]+)\s+Build/i) || ua.match(/\(([^;]+);\s+Android/i);
                    if (matches && matches[1]) {
                        device = matches[1].replace(/Build\/.+/i, '').trim();
                    } else {
                        const parts = ua.split('(');
                        if (parts.length > 1) {
                            const sub = parts[1].split(')');
                            if (sub.length > 0) {
                                const details = sub[0].split(';');
                                device = details.length > 2 ? details[2].trim() : "Android Device";
                            }
                        }
                    }
                } else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
                    device = "iPhone (Apple)";
                } else if (/Macintosh/i.test(ua)) {
                    device = "Macintosh (Apple)";
                } else if (/Windows/i.test(ua)) {
                    device = "Windows PC";
                } else if (/Linux/i.test(ua)) {
                    device = "Linux PC";
                }
            } catch (e) {
                device = "Unknown Hardware";
            }
            return device;
        }

        // ThumbmarkJS লোড এবং সাবমিট প্রসেস ভ্যালিডেশন
        document.addEventListener("DOMContentLoaded", async function() {
            // ১. গুগল ক্লায়েন্ট ড্রাইভার দিয়ে মডেল বের করা
            const resolvedDeviceName = await getPhysicalDeviceName();
            document.getElementById('device-name-input').value = resolvedDeviceName;
            
            // ২. থাম্বমার্ক লাইব্রেরি দিয়ে জেনুইন ফিঙ্গারপ্রিন্ট জেনারেট করা
            if (typeof Thumbmark !== 'undefined') {
                Thumbmark.getFingerprint().then(function(fp) {
                    document.getElementById('device-fingerprint-input').value = fp;
                }).catch(function(err) {
                    // ফেইল হলে নিরাপদ ডাইনামিক র্যান্ডম ব্যাকআপ
                    document.getElementById('device-fingerprint-input').value = "fallback_" + Math.random().toString(36).substring(2, 15);
                });
            } else {
                document.getElementById('device-fingerprint-input').value = "fallback_" + Math.random().toString(36).substring(2, 15);
            }
        });
    </script>

</body>
</html>
