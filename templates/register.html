<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opti Work - Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#F8FAFC] text-[#0F172A] flex items-center justify-center min-h-screen px-4 py-8">

    <div class="bg-white p-6 sm:p-8 rounded-3xl border border-slate-200/60 shadow-xl max-w-sm w-full relative overflow-hidden">
        <div class="absolute -right-10 -top-10 w-28 h-28 bg-emerald-500/5 rounded-full blur-3xl"></div>
        
        <div class="text-center mb-6">
            <span class="text-xl font-extrabold tracking-tight text-slate-900">
                OPTI<span class="text-emerald-500">WORK</span>
            </span>
            <p class="text-[10px] text-slate-400 font-bold uppercase mt-1 tracking-wider">Cloud Hardware Terminal</p>
            
            <div class="mt-3.5 bg-emerald-50 border border-emerald-100 text-emerald-700 text-[10px] font-extrabold px-3.5 py-1.5 rounded-full inline-flex items-center gap-1 shadow-sm">
                <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-ping"></span>
                <span>রেফারেল লিংকে জয়েন করলেই ৳১০০ বোনাস!</span>
            </div>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="p-3 mb-4 text-xs text-center text-red-600 bg-red-50 border border-red-100 rounded-xl font-semibold leading-normal">
                        <i class="fa-solid fa-triangle-exclamation mr-1"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/register" method="POST" class="space-y-4" onsubmit="appendFingerprint()">
            <!-- হিডেন ডিভাইস ফিঙ্গারপ্রিন্ট ইনপুট -->
            <input type="hidden" name="device_fingerprint" id="device-fingerprint-input">

            <div>
                <label class="block text-[9px] font-bold text-slate-400 uppercase mb-1 tracking-wider">ইউজারনেম (Username)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
                        <i class="fa-regular fa-user text-xs"></i>
                    </span>
                    <input type="text" name="username" required placeholder="rahim78" 
                           class="w-full pl-10 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs text-slate-800 placeholder-slate-400 focus:outline-none focus:border-slate-300">
                </div>
            </div>

            <div>
                <label class="block text-[9px] font-bold text-slate-400 uppercase mb-1 tracking-wider">ইমেইল এড্রেস</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
                        <i class="fa-regular fa-envelope text-xs"></i>
                    </span>
                    <input type="email" name="email" required placeholder="name@domain.com" 
                           class="w-full pl-10 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs text-slate-800 placeholder-slate-400 focus:outline-none focus:border-slate-300">
                </div>
            </div>
            
            <div>
                <label class="block text-[9px] font-bold text-slate-400 uppercase mb-1 tracking-wider">পাসওয়ার্ড</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
                        <i class="fa-solid fa-lock text-xs"></i>
                    </span>
                    <input type="password" name="password" required placeholder="••••••••" 
                           class="w-full pl-10 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs text-slate-800 placeholder-slate-400 focus:outline-none focus:border-slate-300">
                </div>
            </div>

            <div>
                <label class="block text-[9px] font-bold text-slate-400 uppercase mb-1 tracking-wider">আমন্ত্রণ কোড (Referral Code / UID)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
                        <i class="fa-solid fa-ticket text-xs"></i>
                    </span>
                    <input type="text" name="referrer" value="{{ ref_by }}" placeholder="6892 (ঐচ্ছিক)" 
                           class="w-full pl-10 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs text-slate-800 placeholder-slate-400 focus:outline-none focus:border-slate-300 font-mono">
                </div>
            </div>

            <button type="submit" class="w-full bg-slate-950 hover:bg-slate-800 text-white font-extrabold text-xs py-3 rounded-xl transition tracking-wider uppercase shadow-sm">
                অ্যাকাউন্ট তৈরি করুন
            </button>
        </form>

        <p class="text-center text-[11px] text-slate-500 mt-5">
            ইতিমধ্যে একটি অ্যাকাউন্ট আছে? <a href="/login" class="text-emerald-500 font-bold hover:underline">লগইন করুন</a>
        </p>
    </div>

    <!-- আল্ট্রা-সিকিউর ওয়েবজিএল এবং অডিও ফিঙ্গারপ্রিন্ট স্ক্রিপ্ট -->
    <script>
        function getAdvancedHardwareSignature() {
            try {
                // ১. Canvas রেন্ডারিং সিগনেচার রিড
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = "alphabetic";
                ctx.fillStyle = "#f60";
                ctx.fillRect(125, 1, 62, 20);
                ctx.fillStyle = "#069";
                ctx.fillText("opti_work_sig_9901", 2, 15);
                const canvasSig = canvas.toDataURL();
                
                // ২. WebGL হার্ডওয়্যার জিপিইউ ড্রাইভার ইনফরমেশন এক্সট্রাক্ট (যা ব্রাউজার বদলালেও একই থাকে)
                let webglRenderer = "unknown_gpu";
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (gl) {
                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debugInfo) {
                        webglRenderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                    }
                }

                // ৩. অডিও সাউন্ড কার্ডের ম্যাথ ফ্রিকোয়েন্সি সিগনেচার রিড করা (অত্যন্ত ইউনিক)
                let audioSignature = "no_audio";
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) {
                    const audioCtx = new AudioContext();
                    const oscillator = audioCtx.createOscillator();
                    const analyser = audioCtx.createAnalyser();
                    oscillator.connect(analyser);
                    audioSignature = analyser.frequencyBinCount; // হার্ডওয়্যার ডাইমেনশন সিগনেচার
                }

                // ৪. সব ডেটা একত্রিত করে হেক্সাডেসিমেল হ্যাশে রূপান্তর
                const components = [
                    screen.width + 'x' + screen.height,
                    screen.colorDepth,
                    new Date().getTimezoneOffset(),
                    navigator.hardwareConcurrency || 4,
                    webglRenderer,  // ফিজিক্যাল গ্রাফিক্স কার্ডের মডেল
                    audioSignature, // ফিজিক্যাল সাউন্ড কার্ডের মডেল
                    canvasSig
                ].join('||');
                
                let hash = 5381;
                for (let i = 0; i < components.length; i++) {
                    hash = ((hash << 5) + hash) + components.charCodeAt(i);
                }
                return (hash >>> 0).toString(16);
            } catch (e) {
                return "secure_fallback_" + Math.random().toString(36).substring(2, 15);
            }
        }

        function appendFingerprint() {
            const fingerprintInput = document.getElementById('device-fingerprint-input');
            if (fingerprintInput) {
                fingerprintInput.value = getAdvancedHardwareSignature();
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            appendFingerprint();
        });
    </script>

</body>
</html>
