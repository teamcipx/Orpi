{% extends 'base.html' %}
{% block content %}

<!-- কাস্টম ৩ডি গ্লসি সাইন এবং পালস গ্লো অ্যানিমেশন স্টাইলস -->
<style>
    @keyframes shine {
        100% {
            left: 125%;
        }
    }
    .shine-card {
        position: relative;
        overflow: hidden;
        background: linear-gradient(135deg, #FFFFFF 0%, #F5F9FC 100%);
        border: 1px solid rgba(226, 232, 240, 0.9);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.01);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .shine-card:hover {
        border-color: rgba(251, 168, 47, 0.2);
        box-shadow: 0 10px 30px rgba(251, 168, 47, 0.03);
        transform: translateY(-2px);
    }
    .shine-card:hover::after {
        animation: shine 0.8s ease-in-out;
    }
    .shine-card::after {
        content: '';
        position: absolute;
        top: 0;
        left: -75%;
        width: 50%;
        height: 100%;
        background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.4) 100%);
        transform: skewX(-25deg);
    }
</style>

<div class="space-y-4 max-w-2xl mx-auto pb-10">
    
    <!-- হেডার কার্ড -->
    <div class="blockio-card p-5 flex justify-between items-center bg-white border border-slate-200 shadow-sm">
        <div class="space-y-1">
            <h2 class="text-sm font-extrabold text-slate-800 flex items-center gap-1.5">
                <i class="fa-solid fa-bullhorn text-[#fba82f] animate-pulse"></i> অফিশিয়াল ঘোষণা ও আপডেটসমূহ
            </h2>
            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">Opti Work - Live Channel Announcements</p>
        </div>
    </div>

    <!-- ডাইনামিক আপডেট ফিড (সর্বশেষ পোস্টটি ওপরে দেখাবে) -->
    <div class="space-y-4">
        {% for item in updates %}
        <div class="shine-card p-5 rounded-3xl flex flex-col items-center space-y-4">
            
            <!-- কার্ডের ভেতরের প্রফেশনাল হেডার -->
            <div class="w-full flex justify-between items-center border-b border-slate-100 pb-3 text-[10px] font-bold">
                <div class="flex items-center gap-2">
                    <span class="w-1.5 h-1.5 bg-[#fba82f] rounded-full shadow-[0_0_6px_#fba82f] animate-pulse"></span>
                    <span class="text-slate-500 uppercase tracking-widest text-[8px]">Official Announcement</span>
                </div>
                <!-- কাস্টম ডেট ব্যাজ -->
                <span class="text-slate-400 font-mono flex items-center gap-1"><i class="fa-regular fa-calendar-days"></i> {{ item.created_at[:10] }}</span>
            </div>
            
            <!-- অফিসিয়াল টেলিগ্রাম পোস্ট স্ক্রিপ্ট জেনারেটর -->
            <div class="w-full flex justify-center bg-slate-50/50 p-2 rounded-2xl border border-slate-100 overflow-hidden">
                <script async 
                        src="https://telegram.org/js/telegram-widget.js?22" 
                        data-telegram-post="{{ item.post_path }}" 
                        data-width="100%">
                </script>
            </div>

            <!-- ভিউ ইন চ্যানেল বাটন (সলিড ব্ল্যাক ওভাল ডক) -->
            <a href="https://t.me/{{ item.post_path }}" target="_blank" class="bg-black hover:opacity-90 text-white text-[9px] font-black uppercase tracking-wider px-5 py-2.5 rounded-full transition flex items-center gap-1.5 shadow">
                <i class="fa-brands fa-telegram text-xs text-[#fba82f]"></i> View in Channel
            </a>
        </div>
        {% else %}
        <p class="text-xs text-slate-400 text-center py-4">বর্তমানে কোনো অফিসিয়াল ঘোষণা পাওয়া যায়নি।</p>
        {% endfor %}
    </div>

</div>

{% endblock %}
