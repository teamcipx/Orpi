<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opti Work - Cloud Terminal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #EDEDF0; 
        }
        .premium-card {
            background: #FFFFFF;
            border: 1px solid #E5E5E9;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.015);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .premium-card:hover {
            border-color: #000000;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
        }
        .glow-btn-light {
            transition: all 0.3s ease;
        }
        .glow-btn-light:hover {
            transform: scale(1.02);
            opacity: 0.95;
        }
        .minimal-select {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23000000"><path d="M7 10l5 5 5-5z"/></svg>');
            background-size: 18px;
            background-position: right 12px center;
            background-repeat: no-repeat;
            appearance: none;
        }
    </style>
</head>
<body class="text-[#000000] min-h-screen flex flex-col md:flex-row pb-28 md:pb-0">

    <aside class="hidden md:flex flex-col justify-between w-64 bg-white border-r border-[#E5E5E9] h-screen fixed left-0 top-0 p-5 z-40">
        <div class="space-y-6">
            <a href="/dashboard" class="flex items-center space-x-2.5 px-2">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="animate-pulse">
                    <rect x="2" y="2" width="8" height="8" rx="2" fill="black"/>
                    <rect x="2" y="14" width="8" height="8" rx="2" fill="black"/>
                    <rect x="14" y="14" width="8" height="8" rx="2" fill="black"/>
                    <path d="M14 2H18C20.2091 2 22 3.79086 22 6V10C22 12.2091 20.2091 14 18 14H14V2Z" fill="black"/>
                </svg>
                <span class="text-base font-extrabold tracking-tight text-black">
                    OPTI<span class="text-slate-500">WORK</span>
                </span>
            </a>

            <div class="space-y-2 text-xs font-bold uppercase tracking-wider text-slate-500">
                <a href="/dashboard" class="flex items-center gap-3 px-3.5 py-3 rounded-xl hover:bg-slate-900 hover:text-white transition-all duration-200">
                    <i class="fa-solid fa-chart-line text-sm"></i> Dashboard
                </a>
                <a href="/tasks" class="flex items-center gap-3 px-3.5 py-3 rounded-xl hover:bg-slate-900 hover:text-white transition-all duration-200">
                    <i class="fa-solid fa-list-check text-sm"></i> Task Pool
                </a>
                <a href="/withdraw" class="flex items-center gap-3 px-3.5 py-3 rounded-xl hover:bg-slate-900 hover:text-white transition-all duration-200">
                    <i class="fa-solid fa-money-bill-transfer text-sm"></i> Withdrawal
                </a>
                <a href="/referrals" class="flex items-center gap-3 px-3.5 py-3 rounded-xl hover:bg-slate-900 hover:text-white transition-all duration-200">
                    <i class="fa-solid fa-gift text-sm"></i> Referrals
                </a>
                <a href="/store" class="flex items-center gap-3 px-3.5 py-3 rounded-xl hover:bg-slate-900 hover:text-white transition-all duration-200">
                    <i class="fa-solid fa-store text-sm"></i> Hardware Store
                </a>
            </div>
        </div>

        {% if user %}
        <div class="border-t border-slate-100 pt-4 flex items-center justify-between">
            <div class="flex items-center gap-2.5">
                <img src="{{ user.avatar_url }}" alt="Profile" class="w-9 h-9 rounded-full object-cover border border-slate-200 shadow-sm">
                <div>
                    <h4 class="text-xs font-bold text-slate-800 leading-none">{{ user.username }}</h4>
                    <span class="text-[9px] text-slate-400 font-bold block mt-1">UID: {{ user.uid }}</span>
                </div>
            </div>
            <a href="/logout" class="text-slate-400 hover:text-red-500 transition text-sm p-1"><i class="fa-solid fa-sign-out-alt"></i></a>
        </div>
        {% endif %}
    </aside>

    <div class="md:hidden sticky top-0 z-50 w-full px-4 pt-3.5 pb-1 bg-gradient-to-b from-[#EDEDF0] via-[#EDEDF0]/90 to-transparent">
        <div class="bg-white border border-[#E5E5E9] rounded-2xl px-4 py-3 flex justify-between items-center shadow-sm relative">
            <a href="/dashboard" class="flex items-center space-x-2">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="2" width="8" height="8" rx="2" fill="black"/>
                    <rect x="2" y="14" width="8" height="8" rx="2" fill="black"/>
                    <rect x="14" y="14" width="8" height="8" rx="2" fill="black"/>
                    <path d="M14 2H18C20.2091 2 22 3.79086 22 6V10C22 12.2091 20.2091 14 18 14H14V2Z" fill="black"/>
                </svg>
                <span class="text-sm font-extrabold tracking-tight text-slate-900">
                    OPTI<span class="text-slate-500">WORK</span>
                </span>
            </a>
            
            <button onclick="toggleTopMenu()" class="text-slate-800 bg-slate-50 hover:bg-slate-100 border border-slate-200 p-2 rounded-xl focus:outline-none transition-all duration-300">
                <i id="menu-icon" class="fa-solid fa-bars text-sm"></i>
            </button>
        </div>

        <div id="top-dropdown-menu" class="hidden mt-2 border border-slate-200/80 bg-white px-5 py-4 space-y-2 text-[10px] font-bold uppercase tracking-wider text-slate-500 w-full rounded-2xl shadow-lg">
            <a href="/dashboard" class="block py-2 hover:text-emerald-500 transition"><i class="fa-solid fa-chart-line mr-2"></i> Dashboard</a>
            <a href="/store" class="block py-2 hover:text-emerald-500 transition"><i class="fa-solid fa-store mr-2"></i> Store</a>
            <a href="/withdraw" class="block py-2 hover:text-emerald-500 transition"><i class="fa-solid fa-money-bill-transfer mr-2"></i> Withdrawal</a>
            <a href="/referrals" class="block py-2 hover:text-emerald-500 transition"><i class="fa-solid fa-users mr-2"></i> Referrals</a>
            <a href="/profile" class="block py-2 hover:text-emerald-500 transition"><i class="fa-solid fa-user-gear mr-2"></i> Account</a>
            <a href="/logout" class="block py-2 text-red-500 hover:text-red-600 transition"><i class="fa-solid fa-sign-out-alt mr-2"></i> Logout</a>
        </div>
    </div>

    <div class="fixed bottom-24 right-4 z-50 md:bottom-6 md:right-6">
        <a href="https://t.me/Optiworkhelp" target="_blank" class="w-11 h-11 bg-black hover:opacity-90 text-white rounded-full flex items-center justify-center shadow-lg transition-all duration-300 hover:scale-110 relative">
            <span class="absolute inset-0 rounded-full bg-black/10 animate-ping"></span>
            <i class="fa-brands fa-telegram text-xl relative z-10"></i>
        </a>
    </div>

    <!-- আল্ট্রা-স্লীক পিল-স্টাইল ফ্লোটিং বটম ডক (সলিড ডার্ক গ্লাস ইফেক্ট) -->
    <div class="fixed bottom-4 left-0 right-0 z-40 px-4 max-w-xs mx-auto md:hidden">
        <div class="bg-slate-950/95 backdrop-blur-xl border border-white/5 py-3 rounded-full shadow-[0_10px_35px_rgba(0,0,0,0.18)] flex justify-around text-[10px] uppercase font-bold text-slate-500">
            <a href="/dashboard" class="bottom-nav-link flex flex-col items-center gap-1.5 hover:text-white transition text-slate-500 relative">
                <i class="fa-solid fa-chart-line text-sm"></i> Home
            </a>
            <a href="/tasks" class="bottom-nav-link flex flex-col items-center gap-1.5 hover:text-white transition text-slate-500 relative">
                <i class="fa-solid fa-list-check text-sm"></i> Task
            </a>
            <a href="/withdraw" class="bottom-nav-link flex flex-col items-center gap-1.5 hover:text-white transition text-slate-500 relative">
                <i class="fa-solid fa-money-bill-transfer text-sm"></i> Withdraw
            </a>
            <a href="/referrals" class="bottom-nav-link flex flex-col items-center gap-1.5 hover:text-white transition text-slate-500 relative">
                <i class="fa-solid fa-gift text-sm"></i> Refer
            </a>
            <a href="/profile" class="bottom-nav-link flex flex-col items-center gap-1.5 hover:text-white transition text-slate-500 relative">
                <i class="fa-solid fa-circle-user text-sm"></i> Account
            </a>
        </div>
    </div>

    <main class="max-w-5xl mx-auto p-4 mt-2 w-full flex-grow md:pl-64 lg:pl-64 shadow-none">
        {% block content %}{% endblock %}
    </main>

    <script>
        function toggleTopMenu() {
            const menu = document.getElementById('top-dropdown-menu');
            const icon = document.getElementById('menu-icon');
            if (menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-xmark');
            } else {
                menu.classList.add('hidden');
                icon.classList.remove('fa-xmark');
                icon.classList.add('fa-bars');
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            const path = window.location.pathname;
            const navLinks = document.querySelectorAll('.bottom-nav-link');
            
            navLinks.forEach(link => {
                const href = link.getAttribute('href');
                if (path === href || (path === '/' && href === '/dashboard')) {
                    link.classList.remove('text-slate-500');
                    link.classList.add('text-white');
                    
                    const dot = document.createElement('span');
                    dot.className = "w-1 h-1 bg-white rounded-full mt-0.5 absolute -bottom-1.5 shadow-[0_0_6px_#ffffff]";
                    link.appendChild(dot);
                }
            });
        });
    </script>
</body>
</html>
