<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opti Work</title>
    
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F8FAFC;
        }
        .minimal-card {
            background: #FFFFFF;
            border: 1px solid #F1F5F9;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.015);
        }
        .glow-btn-light {
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.12);
        }
    </style>
</head>
<body class="text-[#0F172A] min-h-screen flex flex-col pb-24">

    <!-- টপ নেভিগেশন বার -->
    <nav class="bg-white border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <a href="/dashboard" class="flex items-center space-x-2">
                <span class="text-base font-extrabold tracking-tight text-slate-900">
                    OPTI<span class="text-emerald-500">WORK</span>
                </span>
            </a>
            
            <!-- হ্যামবার্গার টগল বাটন -->
            <button onclick="toggleTopMenu()" class="text-slate-500 focus:outline-none p-1 hover:text-slate-900 transition">
                <i id="menu-icon" class="fa-solid fa-bars text-lg"></i>
            </button>
        </div>

        <!-- টগল ড্রপডাউন মেনু -->
        <div id="top-dropdown-menu" class="hidden border-b border-slate-100 bg-white px-4 py-3 space-y-2 text-[10px] font-bold uppercase tracking-wider text-slate-500 max-w-md mx-auto">
            <a href="/dashboard" class="block py-2 hover:text-emerald-500 transition"><i class="fa-solid fa-chart-line mr-2"></i> Dashboard</a>
            <a href="/store" class="block py-2 hover:text-emerald-500 transition"><i class="fa-solid fa-store mr-2"></i> Store</a>
            <a href="/add-money" class="block py-2 hover:text-emerald-500 transition"><i class="fa-solid fa-wallet mr-2"></i> Add Money</a>
            <a href="/referrals" class="block py-2 hover:text-emerald-500 transition"><i class="fa-solid fa-users mr-2"></i> Referrals</a>
            <a href="/logout" class="block py-2 text-red-500 hover:text-red-600 transition"><i class="fa-solid fa-sign-out-alt mr-2"></i> Logout</a>
        </div>
    </nav>

    <!-- বটম নেভিগেশন বার -->
    <div class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-100 py-3 z-40 shadow-sm">
        <div class="max-w-md mx-auto flex justify-around text-[9px] uppercase font-bold text-slate-400">
            <a href="/dashboard" class="flex flex-col items-center gap-1 hover:text-emerald-500 transition">
                <i class="fa-solid fa-chart-line text-sm text-slate-500 hover:text-emerald-500"></i> Home
            </a>
            <a href="/store" class="flex flex-col items-center gap-1 hover:text-emerald-500 transition">
                <i class="fa-solid fa-store text-sm text-slate-500 hover:text-emerald-500"></i> Store
            </a>
            <a href="/add-money" class="flex flex-col items-center gap-1 hover:text-emerald-500 transition">
                <i class="fa-solid fa-wallet text-sm text-slate-500 hover:text-emerald-500"></i> Deposit
            </a>
            <a href="/referrals" class="flex flex-col items-center gap-1 hover:text-emerald-500 transition">
                <i class="fa-solid fa-users text-sm text-slate-500 hover:text-emerald-500"></i> Invite
            </a>
        </div>
    </div>

    <!-- মেইন কন্টেন্ট উইন্ডো -->
    <main class="max-w-md mx-auto p-4 mt-2 w-full flex-grow">
        {% block content %}{% endblock %}
    </main>

    <script>
        function toggleTopMenu() {
            const menu = document.getElementById('top-dropdown-menu');
            const icon = document.getElementById('menu-icon');
            if (menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-xmark');
            } else {
                menu.classList.add('hidden');
                icon.classList.remove('fa-xmark');
                icon.classList.add('fa-bars');
            }
        }
    </script>
</body>
</html>
