<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opti Work</title>
    
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* মডার্ন টেকনোলজি ডট গ্রিড মেস ব্যাকগ্রাউন্ড */
        body {
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1.2px, transparent 1.2px), radial-gradient(#e2e8f0 1.2px, #f8fafc 1.2px);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
        }
        .premium-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.015);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .premium-card:hover {
            border-color: rgba(16, 185, 129, 0.25);
            box-shadow: 0 12px 35px rgba(16, 185, 129, 0.03);
            transform: translateY(-2px);
        }
        .glow-btn-light {
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.2);
            transition: all 0.3s ease;
        }
        .glow-btn-light:hover {
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }
        .minimal-select {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%2364748b"><path d="M7 10l5 5 5-5z"/></svg>');
            background-size: 18px;
            background-position: right 12px center;
            background-repeat: no-repeat;
            appearance: none;
        }
    </style>
</head>
<body class="text-[#0F172A] min-h-screen flex flex-col md:flex-row pb-28 md:pb-0">

    <!-- ================= ১. ডেস্কটপ সাইডবার (লাক্সারি ডার্ক থিম) ================= -->
    <aside class="hidden md:flex flex-col justify-between w-64 bg-[#070A13] border-r border-[#111726] h-screen fixed left-0 top-0 p-5 z-40">
        <div class="space-y-6">
            <!-- ব্র্যান্ড লোগো এবং লাইভ নিওন ডট -->
            <a href="/dashboard" class="flex items-center space-x-2.5 px-2">
                <div class="w-2.5 h-2.5 bg-emerald-400 rounded-full shadow-[0_0_10px_#10b981] animate-pulse"></div>
                <span class="text-base font-extrabold tracking-wider text-white">
                    OPTI<span class="text-emerald-400">WORK</span>
                </span>
            </a>

            <!-- প্রিমিয়াম ক্যাটাগরি মেনু -->
            <div class="space-y-2 text-xs font-bold uppercase tracking-wider text-gray-400">
                <a href="/dashboard" class="flex items-center gap-3 px-3.5 py-3 rounded-xl hover:bg-[#111726] hover:text-white transition-all duration-200">
                    <i class="fa-solid fa-chart-line text-sm text-slate-500"></i> Dashboard
                </a>
                <a href="/tasks" class="flex items-center gap-3 px-3.5 py-3 rounded-xl hover:bg-[#111726] hover:text-white transition-all duration-200">
                    <i class="fa-solid fa-list-check text-sm text-slate-500"></i> Task Pool
                </a>
                <a href="/withdraw" class="flex items-center gap-3 px-3.5 py-3 rounded-xl hover:bg-[#111726] hover:text-white transition-all duration-200">
                    <i class="fa-solid fa-money-bill-transfer text-sm text-slate-500"></i> Withdrawal
                </a>
                <a href="/referrals" class="flex items-center gap-3 px-3.5 py-3 rounded-xl hover:bg-[#111726] hover:text-white transition-all duration-200">
                    <i class="fa-solid fa-gift text-sm text-slate-500"></i> Referrals
                </a>
                <a href="/store" class="flex items-center gap-3 px-3.5 py-3 rounded-xl hover:bg-[#111726] hover:text-white transition-all duration-200">
                    <i class="fa-solid fa-store text-sm text-slate-500"></i> Hardware Store
                </a>
            </div>
        </div>

        <!-- সাইডবার প্রোফাইল সেকশন -->
        {% if user %}
        <div class="border-t border-[#111726] pt-4 flex items-center justify-between">
            <div class="flex items-center gap-2.5">
                <img src="{{ user.avatar_url }}" alt="Profile" class="w-9 h-9 rounded-full object-cover border border-gray-800 shadow-sm">
                <div>
                    <h4 class="text-xs font-bold text-gray-200 leading-none">{{ user.username }}</h4>
                    <span class="text-[9px] text-slate-500 font-bold block mt-1">UID: {{ user.uid }}</span>
                </div>
            </div>
            <a href="/logout" class="text-slate-500 hover:text-red-400 transition text-sm p-1"><i class="fa-solid fa-sign-out-alt"></i></a>
        </div>
        {% endif %}
    </aside>

    <!-- ================= ২. মোবাইল হেডার বার (ফ্রস্টেড গ্লাস ইফেক্ট) ================= -->
    <nav class="bg-white/80 border-b border-slate-100 sticky top-0 z-50 md:hidden w-full backdrop-blur-md">
        <div class="px-4 py-3.5 flex justify-between items-center">
            <a href="/dashboard" class="flex items-center space-x-2">
                <span class="text-base font-extrabold tracking-tight text-slate-900">
                    OPTI<span class="text-emerald-500">WORK</span>
                </span>
            </a>
            
            <button onclick="toggleTopMenu()" class="text-slate-600 focus:outline-none p-1 hover:text-slate-900 transition">
                <i id="menu-icon" class="fa-solid fa-bars text-lg"></i>
            </button>
        </div>

        <!-- মোবাইল মেনু টগল ড্রপডাউন -->
        <div id="top-dropdown-menu" class="hidden border-b border-slate-100 bg-white/95 backdrop-blur-md px-5 py-3.5 space-y-2 text-xs font-semibold uppercase tracking-wider text-slate-500 w-full mx-auto">
            <a href="/dashboard" class="block py-2 hover:text-emerald-500 transition"><i class="fa-solid fa-chart-line mr-2"></i> Dashboard</a>
            <a href="/store" class="block py-2 hover:text-emerald-500 transition"><i class="fa-solid fa-store mr-2"></i> Store</a>
            <a href="/withdraw" class="block py-2 hover:text-emerald-500 transition"><i class="fa-solid fa-money-bill-transfer mr-2"></i> Withdrawal</a>
            <a href="/referrals" class="block py-2 hover:text-emerald-500 transition"><i class="fa-solid fa-users mr-2"></i> Referrals</a>
            <a href="/profile" class="block py-2 hover:text-emerald-500 transition"><i class="fa-solid fa-user-gear mr-2"></i> Account</a>
            <a href="/logout" class="block py-2 text-red-500 hover:text-red-600 transition"><i class="fa-solid fa-sign-out-alt mr-2"></i> Logout</a>
        </div>
    </nav>

    <!-- ================= ৩. ফ্লোটিং টেলিগ্রাম কাস্টমার সাপোর্ট বাটন ================= -->
    <div class="fixed bottom-24 right-4 z-50 md:bottom-6 md:right-6">
        <a href="https://t.me/Optiworkhelp" target="_blank" class="w-11 h-11 bg-[#229ED9] hover:bg-[#1d82c4] text-white rounded-full flex items-center justify-center shadow-lg transition-all duration-300 hover:scale-110 relative">
            <span class="absolute inset-0 rounded-full bg-[#229ED9]/30 animate-ping"></span>
            <i class="fa-brands fa-telegram text-xl relative z-10"></i>
        </a>
    </div>

    <!-- ================= ৪. ফ্লোটিং মোবাইল বটম পিল-ডক (Pill-Style Floating Dock) ================= -->
    <div class="fixed bottom-4 left-0 right-0 z-40 px-4 max-w-sm mx-auto md:hidden">
        <div class="bg-white/95 backdrop-blur-md border border-slate-200/80 py-3 rounded-full shadow-[0_10px_35px_rgba(0,0,0,0.08)] flex justify-around text-[10px] uppercase font-bold text-slate-400">
            <!-- হোম -->
            <a href="/dashboard" class="bottom-nav-link flex flex-col items-center gap-1 hover:text-emerald-500 transition text-slate-400 relative">
                <i class="fa-solid fa-chart-line text-base"></i> Home
            </a>
            <!-- টাস্ক -->
            <a href="/tasks" class="bottom-nav-link flex flex-col items-center gap-1 hover:text-emerald-500 transition text-slate-400 relative">
                <i class="fa-solid fa-list-check text-base"></i> Task
            </a>
            <!-- উইথড্র -->
            <a href="/withdraw" class="bottom-nav-link flex flex-col items-center gap-1 hover:text-emerald-500 transition text-slate-400 relative">
                <i class="fa-solid fa-money-bill-transfer text-base"></i> Withdraw
            </a>
            <!-- রেফার -->
            <a href="/referrals" class="bottom-nav-link flex flex-col items-center gap-1 hover:text-emerald-500 transition text-slate-400 relative">
                <i class="fa-solid fa-gift text-base"></i> Refer
            </a>
            <!-- প্রোফাইল -->
            <a href="/profile" class="bottom-nav-link flex flex-col items-center gap-1 hover:text-emerald-500 transition text-slate-400 relative">
                <i class="fa-solid fa-circle-user text-base"></i> Account
            </a>
        </div>
    </div>

    <!-- মেইন কন্টেন্ট উইন্ডো -->
    <main class="max-w-5xl mx-auto p-4 mt-2 w-full flex-grow md:pl-64 lg:pl-64 shadow-none">
        {% block content %}{% endblock %}
    </main>

    <script>
        function toggleTopMenu() {
            const menu = document.getElementById('top-dropdown-menu');
            const icon = document.getElementById('menu-icon');
            if (menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-xmark');
            } else {
                menu.classList.add('hidden');
                icon.classList.remove('fa-xmark');
                icon.classList.add('fa-bars');
            }
        }

        // ব্রাউজারের লাইভ URL ট্র্যাক করে স্বয়ংক্রিয়ভাবে একটিভ বাটন নিয়ন ডট সহ গ্লো করার স্ক্রিপ্ট
        document.addEventListener("DOMContentLoaded", function() {
            const path = window.location.pathname;
            const navLinks = document.querySelectorAll('.bottom-nav-link');
            
            navLinks.forEach(link => {
                const href = link.getAttribute('href');
                // রুট পাথ বা ড্যাশবোর্ড পাথ মিললে হোম আইকনকে একটিভ করবে
                if (path === href || (path === '/' && href === '/dashboard')) {
                    link.classList.remove('text-slate-400');
                    link.classList.add('text-emerald-500');
                    
                    // একটিভ ইন্ডিকেটর নিওন ডট তৈরি করা হচ্ছে
                    const dot = document.createElement('span');
                    dot.className = "w-1 h-1 bg-emerald-500 rounded-full mt-0.5 absolute -bottom-1.5 shadow-[0_0_6px_#10b981]";
                    link.appendChild(dot);
                }
            });
        });
    </script>
</body>
</html>
