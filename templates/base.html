<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opti Work</title>
    
    <!-- Google Fonts: Plus Jakarta Sans (Premium Typography) -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            orange: '#f08e32', // Reference image orange
                            dark: '#000000',
                            gray: '#f8f9fa',
                            border: '#eef0f2'
                        }
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Modern Minimalist Background */
        body {
            background-color: #f8f9fa;
            color: #000000;
        }

        /* Reference Image Card Style */
        .premium-card {
            background: #ffffff;
            border: 1px solid #eef0f2;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .premium-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
            border-color: #f08e3233;
        }

        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .floating { animation: float 3s ease-in-out infinite; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #f08e32; border-radius: 10px; }

        /* Smooth Transitions */
        .transition-all { transition: all 0.4s ease; }

        /* Bottom Nav Glassmorphism */
        .glass-dock {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col md:flex-row pb-28 md:pb-0">

    <!-- ================= ১. ডেস্কটপ সাইডবার (Clean White Theme) ================= -->
    <aside class="hidden md:flex flex-col justify-between w-64 bg-white border-r border-brand-border h-screen fixed left-0 top-0 p-6 z-40">
        <div class="space-y-8">
            <!-- ব্র্যান্ড লোগো (OptiWork) -->
            <a href="/dashboard" class="flex items-center space-x-2 px-2">
                <div class="w-7 h-7 bg-black rounded-lg flex items-center justify-center">
                    <div class="w-1.5 h-1.5 bg-brand-orange rounded-full"></div>
                </div>
                <span class="text-xl font-extrabold tracking-tight text-black">
                    OPTI<span class="text-brand-orange">WORK</span>
                </span>
            </a>

            <!-- মেনু আইটেম -->
            <div class="space-y-1">
                <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-4 px-3">Main Menu</p>
                <a href="/dashboard" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-brand-gray text-gray-600 hover:text-brand-orange transition-all font-semibold text-sm">
                    <i class="fa-solid fa-chart-pie text-lg"></i> Dashboard
                </a>
                <a href="/tasks" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-brand-gray text-gray-600 hover:text-brand-orange transition-all font-semibold text-sm">
                    <i class="fa-solid fa-layer-group text-lg"></i> Task Pool
                </a>
                <a href="/withdraw" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-brand-gray text-gray-600 hover:text-brand-orange transition-all font-semibold text-sm">
                    <i class="fa-solid fa-wallet text-lg"></i> Withdrawal
                </a>
                <a href="/referrals" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-brand-gray text-gray-600 hover:text-brand-orange transition-all font-semibold text-sm">
                    <i class="fa-solid fa-user-plus text-lg"></i> Referrals
                </a>
                <a href="/store" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-brand-gray text-gray-600 hover:text-brand-orange transition-all font-semibold text-sm">
                    <i class="fa-solid fa-box-open text-lg"></i> Hardware Store
                </a>
            </div>
        </div>

        <!-- সাইডবার প্রোফাইল -->
        {% if user %}
        <div class="border-t border-brand-border pt-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="{{ user.avatar_url }}" alt="Profile" class="w-9 h-9 rounded-full object-cover border border-gray-100">
                <div>
                    <h4 class="text-xs font-bold text-black leading-none">{{ user.username }}</h4>
                    <span class="text-[10px] text-gray-400 font-bold block mt-1">ID: {{ user.uid }}</span>
                </div>
            </div>
            <a href="/logout" class="text-gray-400 hover:text-red-500 transition-colors"><i class="fa-solid fa-power-off text-sm"></i></a>
        </div>
        {% endif %}
    </aside>

    <!-- ================= ২. মোবাইল হেডার বার (Premium Glass) ================= -->
    <nav class="bg-white/80 border-b border-brand-border sticky top-0 z-50 md:hidden w-full backdrop-blur-lg">
        <div class="px-5 py-4 flex justify-between items-center">
            <a href="/dashboard" class="flex items-center space-x-2">
                <div class="w-6 h-6 bg-black rounded-md flex items-center justify-center">
                    <div class="w-1 h-1 bg-brand-orange rounded-full"></div>
                </div>
                <span class="text-lg font-extrabold tracking-tight text-black uppercase">
                    Opti<span class="text-brand-orange">Work</span>
                </span>
            </a>
            
            <button onclick="toggleTopMenu()" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 text-black border border-gray-100">
                <i id="menu-icon" class="fa-solid fa-bars-staggered"></i>
            </button>
        </div>

        <!-- মোবাইল ড্রপডাউন মেনু -->
        <div id="top-dropdown-menu" class="hidden border-b border-brand-border bg-white px-6 py-4 space-y-3 shadow-xl">
            <a href="/dashboard" class="block text-sm font-bold text-gray-600 py-2"><i class="fa-solid fa-house mr-3 text-brand-orange"></i> Dashboard</a>
            <a href="/store" class="block text-sm font-bold text-gray-600 py-2"><i class="fa-solid fa-shop mr-3 text-brand-orange"></i> Store</a>
            <a href="/withdraw" class="block text-sm font-bold text-gray-600 py-2"><i class="fa-solid fa-wallet mr-3 text-brand-orange"></i> Withdrawal</a>
            <a href="/profile" class="block text-sm font-bold text-gray-600 py-2"><i class="fa-solid fa-user-gear mr-3 text-brand-orange"></i> Account</a>
            <a href="/logout" class="block text-sm font-bold text-red-500 py-2"><i class="fa-solid fa-arrow-right-from-bracket mr-3"></i> Logout</a>
        </div>
    </nav>

    <!-- ================= ৩. ফ্লোটিং টেলিগ্রাম সাপোর্ট ================= -->
    <div class="fixed bottom-28 right-6 z-50 md:bottom-8 md:right-8">
        <a href="https://t.me/Optiworkhelp" target="_blank" class="w-14 h-14 bg-brand-orange text-white rounded-2xl flex items-center justify-center shadow-xl shadow-orange-200 transition-transform hover:scale-110 active:scale-95">
            <i class="fa-brands fa-telegram text-2xl"></i>
        </a>
    </div>

    <!-- ================= ৪. নতুন মডার্ন মোবাইল বটম ডক (Pill Style) ================= -->
    <div class="fixed bottom-6 left-0 right-0 z-40 px-6 max-w-md mx-auto md:hidden">
        <div class="glass-dock py-4 px-2 rounded-[32px] shadow-2xl flex justify-around items-center border border-white/50">
            <!-- ড্যাশবোর্ড -->
            <a href="/dashboard" class="bottom-nav-link flex flex-col items-center gap-1.5 transition-all text-gray-400 relative group px-3">
                <i class="fa-solid fa-grid-2 text-xl group-hover:text-brand-orange"></i>
                <span class="text-[9px] font-black uppercase tracking-tighter">Home</span>
            </a>
            <!-- টাস্ক -->
            <a href="/tasks" class="bottom-nav-link flex flex-col items-center gap-1.5 transition-all text-gray-400 relative group px-3">
                <i class="fa-solid fa-bolt-lightning text-xl group-hover:text-brand-orange"></i>
                <span class="text-[9px] font-black uppercase tracking-tighter">Tasks</span>
            </a>
            <!-- উইথড্র -->
            <a href="/withdraw" class="bottom-nav-link flex flex-col items-center gap-1.5 transition-all text-gray-400 relative group px-3">
                <i class="fa-solid fa-circle-dollar-to-slot text-xl group-hover:text-brand-orange"></i>
                <span class="text-[9px] font-black uppercase tracking-tighter">Money</span>
            </a>
            <!-- রেফার -->
            <a href="/referrals" class="bottom-nav-link flex flex-col items-center gap-1.5 transition-all text-gray-400 relative group px-3">
                <i class="fa-solid fa-gift text-xl group-hover:text-brand-orange"></i>
                <span class="text-[9px] font-black uppercase tracking-tighter">Refer</span>
            </a>
            <!-- প্রোফাইল -->
            <a href="/profile" class="bottom-nav-link flex flex-col items-center gap-1.5 transition-all text-gray-400 relative group px-3">
                <i class="fa-solid fa-user-circle text-xl group-hover:text-brand-orange"></i>
                <span class="text-[9px] font-black uppercase tracking-tighter">User</span>
            </a>
        </div>
    </div>

    <!-- মেইন কন্টেন্ট উইন্ডো -->
    <main class="max-w-6xl mx-auto p-5 mt-4 w-full flex-grow md:pl-72 lg:pl-72 transition-all">
        <!-- Content Area -->
        <div class="reveal-content">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script>
        function toggleTopMenu() {
            const menu = document.getElementById('top-dropdown-menu');
            const icon = document.getElementById('menu-icon');
            if (menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
                icon.className = 'fa-solid fa-xmark';
            } else {
                menu.classList.add('hidden');
                icon.className = 'fa-solid fa-bars-staggered';
            }
        }

        // Active Link Highlighting (Orange Dot & Color)
        document.addEventListener("DOMContentLoaded", function() {
            const path = window.location.pathname;
            const navLinks = document.querySelectorAll('.bottom-nav-link');
            
            navLinks.forEach(link => {
                const href = link.getAttribute('href');
                if (path === href || (path === '/' && href === '/dashboard')) {
                    link.classList.remove('text-gray-400');
                    link.classList.add('text-brand-orange');
                    
                    // Active Indicator
                    const dot = document.createElement('span');
                    dot.className = "w-1 h-1 bg-brand-orange rounded-full mt-0.5 absolute -bottom-2 shadow-[0_0_8px_#f08e32]";
                    link.appendChild(dot);
                }
            });
        });

        // Simple Reveal Animation
        document.addEventListener("DOMContentLoaded", function() {
            const main = document.querySelector('main');
            main.style.opacity = '0';
            main.style.transform = 'translateY(15px)';
            setTimeout(() => {
                main.style.transition = 'all 0.6s ease-out';
                main.style.opacity = '1';
                main.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body>
</html>
